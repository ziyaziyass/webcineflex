<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/daftar.css">
</head>
<style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }

    /* Membuat lapisan background tiruan */
    body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 1920px;      /* ukuran tetap, tidak ikut lebar browser */
  height: 1080px;      /* ukuran tetap, tidak ikut tinggi browser */
  z-index: -1;

  background-image: url('../img/kursinabioskop.png');
  background-size: 1920px 1080px;   /* ukuran gambar dikunci, bukan "cover" */
  background-position: center;
  background-repeat: no-repeat;

  filter: blur(2px);
  transform: scale(1.1);

  box-shadow: inset 0 0 100px 400px rgba(0, 0, 0, 0.8);
}

  </style>
</head>
<body>

  <div class="auth-card">
    <a href="home.html" class="back-btn">
    <span class="back-icon">↩</span>
    <span class="back-label">Kembali</span>
  </a>
  <h1>Daftar</h1>
  <p class="subtitle">Selamat datang!<br>silahkan isi data untuk melanjutkan</p>

  <form>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Masukkan username">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Masukkan email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Masukkan password">

    <div class="checkbox-row">
      <input type="checkbox" id="terms" >
      <label for="terms">Saya setuju dengan <a href="#">Syarat &amp; Ketentuan</a></label>
    </div>

    <button type="submit">Daftar</button>

    <hr>

    <p class="login-text">Sudah punya akun? <a href="login.html">Masuk</a></p>
  </form>
</div>

</body>
</html>
