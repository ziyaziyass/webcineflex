<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINEFLEX - Daftar Favorit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/favorite.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="home.html"><span style="color: #FFFFFF;">CINE</span><span style="color: #4C7D62;">FLEX</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="film.html">Film</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="streaming.html">Streaming</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="favorite.html" style="font-weight: 600;">Favorite</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="daftarfilm.html">Promo</a>
          </li>
        </ul>
        <form class="d-flex" role="search">
          <input id="searchInput" class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <a href="login.html" class="btn btn-outline-success" type="submit">Masuk</a>
        </form>
      </div>
    </div>
  </nav>

  <main class="favorite-page">
    <header class="page-head">
      <h1>Daftar Favorit</h1>
      <p id="favoriteSubtitle">Kelola film dan acara favoritmu.</p>
    </header>

    <div class="filter-row">
      <button class="filter-tab active" type="button" data-filter="semua">Semua</button>
      <button class="filter-tab" type="button" data-filter="film">Film</button>
      <button class="filter-tab" type="button" data-filter="tv">TV Show</button>
      <button class="filter-tab" type="button" data-filter="streaming">Streaming</button>
    </div>

    <section class="favorite-grid" id="favoriteGrid" aria-live="polite"></section>
    <p class="empty-state" id="emptyState">Belum ada film favorit. Tekan tombol hati di halaman Film atau Home untuk menambahkan.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="../jsnya/films.js"></script>
  <script src="../jsnya/favorite.js"></script>
</body>
</html>
