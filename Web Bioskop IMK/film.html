<main class="film-page">

    <header class="page-head">
        <h1>Film</h1>
        <p>Pilih film yang sedang tayang atau segera hadir di CINEFLEX.</p>
    </header>

    <div class="film-filter">

        <button class="filter-btn active">
            Semua Film
        </button>

        <button class="filter-btn">
            Sedang Tayang
        </button>

        <button class="filter-btn">
            Akan Tayang
        </button>

    </div>

    <div class="film-grid" id="filmGrid">

        <div class="card flex-shrink-0 tayang-card film-card" data-film="backrooms" data-status="tayang">
            <button class="favorite-btn" type="button" aria-label="Tambah Backroom ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/4bEPOjEUsXQiXJ3wn9GFRHd1ibR.jpg" class="card-img-top" alt="Backroom">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Backroom</h6>
                <p class="mb-0 tayang-genre">HORROR</p>
            </div>
        </div>

        <div class="card flex-shrink-0 tayang-card film-card" data-film="hailmary" data-status="tayang">
            <button class="favorite-btn" type="button" aria-label="Tambah Project Hail Mary ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/u0xlWhNNGug0eYUb7cwrGmAOC7V.jpg" class="card-img-top" alt="Project Hail Mary">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Project Hail Mary</h6>
                <p class="mb-0 tayang-genre">SCI-FI</p>
            </div>
        </div>

        <div class="card flex-shrink-0 tayang-card film-card" data-film="reze" data-status="tayang">
            <button class="favorite-btn" type="button" aria-label="Tambah Chainsaw Man Arc Reze ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/fmT8aJuunlHJvfY18ZkzRXnequF.jpg" class="card-img-top" alt="Chainsaw Man Arc Reze">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Chainsaw Man Arc Reze</h6>
                <p class="mb-0 tayang-genre">DRAMA</p>
            </div>
        </div>

        <div class="card flex-shrink-0 tayang-card film-card" data-film="obsession" data-status="tayang">
            <button class="favorite-btn" type="button" aria-label="Tambah Obsession ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/40I66L7QKguTFDPvcLcdiTbAD7I.jpg" class="card-img-top" alt="Obsession">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Obsession</h6>
                <p class="mb-0 tayang-genre">THRILLER</p>
            </div>
        </div>

        <div class="card flex-shrink-0 tayang-card film-card" data-film="oppenheimer" data-status="tayang">
            <button class="favorite-btn" type="button" aria-label="Tambah Oppenheimer ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" class="card-img-top" alt="Oppenheimer">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Oppenheimer</h6>
                <p class="mb-0 tayang-genre">THRILLER</p>
            </div>
        </div>

        <div class="card flex-shrink-0 tayang-card film-card" data-film="fnaf2" data-status="akan">
            <button class="favorite-btn" type="button" aria-label="Tambah Five Nights at Freddy's 2 ke favorite">
                <span aria-hidden="true">&#9825;</span>
            </button>
            <img src="https://image.tmdb.org/t/p/original/4DHPycxF9R3Yq8eJCV4J8wFpW4u.jpg" class="card-img-top" alt="Five Nights at Freddy's 2">
            <div class="card-body p-2">
                <h6 class="card-title text-white mb-0 text-truncate">Five Nights at Freddy's 2</h6>
                <p class="mb-0 tayang-genre">HORROR</p>
            </div>
        </div>


    </div>
